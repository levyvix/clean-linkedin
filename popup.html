<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Clean LinkedIn</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        width: 220px;
        background: #f3f2ef;
        color: #1d1d1d;
      }
      header {
        background: #0a66c2;
        color: white;
        padding: 12px 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      header h1 { font-size: 14px; font-weight: 600; }
      .row {
        padding: 14px 16px;
        background: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        font-weight: 600;
      }
      .switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute;
        inset: 0;
        background: #ccc;
        border-radius: 20px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .slider::before {
        content: '';
        position: absolute;
        width: 14px; height: 14px;
        left: 3px; top: 3px;
        background: white;
        border-radius: 50%;
        transition: transform 0.2s;
      }
      input:checked + .slider { background: #0a66c2; }
      input:checked + .slider::before { transform: translateX(16px); }
    </style>
  </head>
  <body>
    <header>
      <h1>Clean LinkedIn</h1>
    </header>
    <div class="row">
      <span>Extensão ativa</span>
      <label class="switch">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
