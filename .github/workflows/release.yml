name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package extension
        run: |
          zip -r "clean-linkedin-${{ github.ref_name }}.zip" \
            manifest.json \
            content.js \
            popup.html \
            popup.js \
            icons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: clean-linkedin-${{ github.ref_name }}.zip
          generate_release_notes: true
